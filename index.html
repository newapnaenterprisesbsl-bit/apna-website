<!DOCTYPE html>
<html>
<head>
  <title>Apna Enterprises</title>

  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; text-align:center; }
    header { background:black; color:white; padding:20px; font-size:24px; }

    .container { padding:20px; }

    .services {
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .card {
      background:white;
      padding:20px;
      width:250px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    input, button {
      padding:10px;
      margin:10px;
    }

    .btn {
      background:black;
      color:white;
      border:none;
      border-radius:5px;
    }

    .whatsapp {
      position:fixed;
      bottom:20px;
      right:20px;
      background:green;
      color:white;
      padding:15px;
      border-radius:50%;
      text-decoration:none;
      font-size:20px;
    }
  </style>
</head>

<body>

<header>
  Apna Enterprises - Digital Services
</header>

<div class="container">

  <h2>Our Services</h2>
  <div class="services" id="services"></div>

  <h2>Upload Your Document</h2>

  <input type="text" id="name" placeholder="Your Name">
  <br>
  <input type="file" id="file">
  <br>
  <button class="btn" onclick="sendWhatsApp()">Submit</button>

  <h2>Contact</h2>
  <p>9876543210</p>

</div>

<a class="whatsapp" href="https://wa.me/919876543210">💬</a>

<script>
let services = JSON.parse(localStorage.getItem("services")) || [];

let html = "";
services.forEach(s => {
  html += `
    <div class="card">
      <h3>${s.name}</h3>
      <p>${s.desc}</p>
    </div>
  `;
});

document.getElementById("services").innerHTML = html;

function sendWhatsApp(){
  let name = document.getElementById("name").value;

  let msg = `Name: ${name} \nI want to upload document`;

  window.open(`https://wa.me/919876543210?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
